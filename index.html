<!doctype html>
<html lang="nl" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <!-- Meta tags are synchronised at runtime by syncMetadata() from app-config.ts -->
    <title>Loading…</title>
    <meta name="description" content="" />
    <meta name="author" content="" />
    <meta name="theme-color" content="#3d8c6e" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-src 'self' https://checkout.stripe.com;" />

    <link rel="icon" href="/favicon.ico" />

    <!-- Open Graph (populated at runtime by syncMetadata) -->
    <meta property="og:title" content="" />
    <meta property="og:description" content="" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
    
    <!-- Preload Arabic fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <noscript>
      <div style="padding:2rem;text-align:center;font-family:sans-serif;">
        <h1>JavaScript is vereist</h1>
        <p>Huis van het Arabisch vereist JavaScript om te functioneren. Schakel JavaScript in of gebruik een moderne browser.</p>
        <p>Neem contact op via <a href="mailto:support@huisvanhetarabisch.nl">support@huisvanhetarabisch.nl</a>.</p>
      </div>
    </noscript>
    <div id="root"></div>
    <script>
      // BLOCKING cache purge: app scripts only load AFTER SW + cache cleanup completes
      (async function() {
        try {
          if ('serviceWorker' in navigator) {
            var regs = await navigator.serviceWorker.getRegistrations();
            for (var i = 0; i < regs.length; i++) {
              await regs[i].unregister();
            }
          }
          if ('caches' in window) {
            var names = await caches.keys();
            for (var j = 0; j < names.length; j++) {
              await names[j] && caches.delete(names[j]);
            }
          }
        } catch(e) { /* ignore cleanup errors */ }
        // NOW load the app - SW is guaranteed to be gone
        var s = document.createElement('script');
        s.type = 'module';
        s.src = '/src/main.tsx';
        document.body.appendChild(s);
      })();
    </script>
  </body>
</html>
