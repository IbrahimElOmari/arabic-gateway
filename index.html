  <body>
    <noscript>
      <div style="padding:2rem;text-align:center;font-family:sans-serif;">
        <h1>JavaScript is vereist</h1>
        <p>Huis van het Arabisch vereist JavaScript om te functioneren. Schakel JavaScript in of gebruik een moderne browser.</p>
        <p>Neem contact op via <a href="mailto:support@huisvanhetarabisch.nl">support@huisvanhetarabisch.nl</a>.</p>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Non-blocking cleanup: app boot mag nooit wachten op SW/cache opschoning.
      (function () {
        const withTimeout = (promise, timeoutMs) =>
          Promise.race([
            promise,
            new Promise((resolve) => setTimeout(resolve, timeoutMs)),
          ]);

        const cleanup = async () => {
          try {
            if ("serviceWorker" in navigator) {
              const regs = await withTimeout(navigator.serviceWorker.getRegistrations(), 2000);
              if (Array.isArray(regs) && regs.length) {
                await withTimeout(Promise.allSettled(regs.map((r) => r.unregister())), 2000);
              }
            }

            if ("caches" in window) {
              const names = await withTimeout(caches.keys(), 2000);
              if (Array.isArray(names) && names.length) {
                await withTimeout(Promise.allSettled(names.map((name) => caches.delete(name))), 2000);
              }
            }
          } catch (e) {
            // Cleanup failures mogen de app nooit blokkeren.
          }
        };

        if (document.readyState === "loading") {
          window.addEventListener("DOMContentLoaded", () => {
            void cleanup();
          }, { once: true });
        } else {
          void cleanup();
        }
      })();
    </script>
  </body>
</html>
